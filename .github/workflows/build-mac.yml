name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.7.0)'
        required: true
      branch:
        description: 'voice-typer branch to build from (default: master). Use a feature branch for pre-release smoke tests; do NOT --publish from non-master.'
        required: false
        default: 'master'
      publish:
        description: 'Publish DMGs to golem-releases GitHub Release? (only for master/release builds)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/dontoreve/voice-typer.git
          cd voice-typer
          git checkout "${{ github.event.inputs.branch }}"
          echo "Building from voice-typer @ $(git rev-parse HEAD) (branch=${{ github.event.inputs.branch }})"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: voice-typer
        run: npm install

      # NOTE 2026-05-04: Mac native paste helper compilation is DISABLED.
      # Empirically, macOS silently denies CGEvents posted from a child binary
      # inside Golem.app even when AXIsProcessTrustedWithOptions returns true,
      # and refuses to show the Accessibility prompt to grant the helper its
      # own permission. The result is a broken app (paste + AI Transform both
      # fail silently). See voice-typer/DEBUGGING_LOG.md (2026-05-04 entry)
      # for the full investigation. Mac stays on osascript via lib/clipboard.js
      # until we ship the in-process NAPI replacement. The Swift source is
      # preserved in voice-typer/native/mac/ for that future rewrite.

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          # Install Apple intermediate certificate
          curl -O https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates DeveloperIDG2CA.cer
          rm certificate.p12 DeveloperIDG2CA.cer

      - name: Build, sign, notarize, and (optionally) publish
        working-directory: voice-typer
        env:
          # Notarization (electron-builder v26 notarize: true reads these automatically)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Publish to github.com/dontoreve/golem-releases (auto-creates draft release)
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ "${{ github.event.inputs.publish }}" = "true" ]; then
            echo "Building + publishing to golem-releases"
            npx electron-builder --mac --publish always
          else
            echo "Building WITHOUT publish (smoke test for branch=${{ github.event.inputs.branch }})"
            npx electron-builder --mac --publish never
          fi

      - name: Collect artifacts for logs
        if: always()
        working-directory: voice-typer
        run: ls -la dist/ || true

      - name: Upload DMG as workflow artifact (smoke test only)
        if: ${{ github.event.inputs.publish == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          # Sanitize branch name — GitHub artifact names reject `/`, `:`, etc.
          name: golem-dmg-smoke-${{ github.run_id }}
          path: |
            voice-typer/dist/*.dmg
            voice-typer/dist/*.zip
          retention-days: 7
          if-no-files-found: warn
