name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.7.0)'
        required: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/dontoreve/voice-typer.git
          cd voice-typer
          git checkout master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: voice-typer
        run: npm install

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          # Install Apple intermediate certificate
          curl -O https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates DeveloperIDG2CA.cer
          rm certificate.p12 DeveloperIDG2CA.cer

      - name: Build, sign, notarize, and publish to GitHub release
        working-directory: voice-typer
        env:
          # Notarization (electron-builder v26 notarize: true reads these automatically)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Publish to github.com/dontoreve/golem-releases (auto-creates draft release)
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: npx electron-builder --mac --publish always

      - name: Collect artifacts for logs
        if: always()
        working-directory: voice-typer
        run: ls -la dist/ || true
